suite: Celery Flower Service tests
templates:
  - templates/celery-flower/service.yaml
tests:
  - it: should render Service when worker.enabled and worker.flower.enabled
    set:
      environment: TEST
      worker:
        enabled: true
        flower:
          enabled: true
    asserts:
      - isKind:
          of: Service
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.labels.component
          value: celery-flower
      - equal:
          path: metadata.labels.environment
          value: TEST
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: 8000

  - it: should not render when worker.flower.enabled is false
    set:
      worker:
        enabled: true
        flower:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when worker.enabled is false
    set:
      worker:
        enabled: false
        flower:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
