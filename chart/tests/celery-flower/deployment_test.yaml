suite: Celery Flower Deployment tests
templates:
  - templates/celery-flower/deployment.yaml
  - templates/config/secret.yaml
  - templates/config/configmap.yaml
tests:
  - it: should render Deployment when worker.enabled and worker.flower.enabled
    template: templates/celery-flower/deployment.yaml
    set:
      environment: TEST
      image:
        name: ghcr.io/example/app
        tag: v1
      worker:
        enabled: true
        flower:
          enabled: true
          command: ["celery", "-A", "myapp", "flower", "--port=8000"]
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1
      - equal:
          path: metadata.labels.component
          value: worker-flower
      - equal:
          path: metadata.labels.environment
          value: TEST
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["celery", "-A", "myapp", "flower", "--port=8000"]
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/app:v1"

  - it: should override image with worker.flower.image
    template: templates/celery-flower/deployment.yaml
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      worker:
        enabled: true
        flower:
          enabled: true
          image:
            name: ghcr.io/example/flower
            tag: v2
          command: ["celery"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/flower:v2"

  - it: should not render when worker.flower.enabled is false
    template: templates/celery-flower/deployment.yaml
    set:
      worker:
        enabled: true
        flower:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when worker.enabled is false
    template: templates/celery-flower/deployment.yaml
    set:
      worker:
        enabled: false
        flower:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
