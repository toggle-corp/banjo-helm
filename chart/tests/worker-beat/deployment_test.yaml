suite: Worker Beat Deployment tests
templates:
  - templates/worker-beat/deployment.yaml
  - templates/config/secret.yaml
  - templates/config/configmap.yaml
tests:
  - it: should render Deployment when worker.enabled and worker.beat.enabled
    template: templates/worker-beat/deployment.yaml
    set:
      environment: TEST
      image:
        name: ghcr.io/example/app
        tag: v1
      worker:
        enabled: true
        beat:
          enabled: true
          command: ["celery", "-A", "myapp", "beat", "-l", "INFO"]
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1
      - equal:
          path: metadata.labels.component
          value: worker-beat
      - equal:
          path: metadata.labels.environment
          value: TEST
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["celery", "-A", "myapp", "beat", "-l", "INFO"]
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/app:v1"

  - it: should override image with worker.beat.image
    template: templates/worker-beat/deployment.yaml
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      worker:
        enabled: true
        beat:
          enabled: true
          image:
            name: ghcr.io/example/beat
            tag: v2
          command: ["celery"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/beat:v2"

  - it: should not render when worker.beat.enabled is false
    template: templates/worker-beat/deployment.yaml
    set:
      worker:
        enabled: true
        beat:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when worker.enabled is false
    template: templates/worker-beat/deployment.yaml
    set:
      worker:
        enabled: false
        beat:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
