suite: ServiceAccount tests
templates:
  - templates/api/service-account.yaml
tests:
  - it: should render ServiceAccount with annotations, labels and automount flag
    set:
      serviceAccount:
        create: true
        automountServiceAccountToken: true
        annotations:
          iam.gke.io/gcp-service-account: my-gsa@project.iam
        labels:
          team: platform
    asserts:
      - isKind:
          of: ServiceAccount
      - isAPIVersion:
          of: v1
      - isNotEmpty:
          path: metadata.name
      - equal:
          path: automountServiceAccountToken
          value: true
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: my-gsa@project.iam
      - equal:
          path: metadata.labels.team
          value: platform

  - it: should use serviceAccountName override when provided
    set:
      serviceAccountName: my-custom-sa
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should set automountServiceAccountToken=false when configured
    set:
      serviceAccount:
        create: true
        automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not render when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0
