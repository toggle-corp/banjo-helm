suite: SecretProviderClass tests
templates:
  - templates/api/secrets-provider-class.yaml
tests:
  - it: should render SecretProviderClass with provider and parameters
    set:
      secretsStoreCsiDriver:
        create: true
        provider: azure
        parameters:
          usePodIdentity: "false"
          clientID: my-client-id
          keyvaultName: my-vault
          tenantId: my-tenant
        secretsKeyMap:
          POSTGRES_PASSWORD: db-password
          API_KEY: api-key-vault
    asserts:
      - isKind:
          of: SecretProviderClass
      - isAPIVersion:
          of: secrets-store.csi.x-k8s.io/v1
      - isNotEmpty:
          path: metadata.name
      - equal:
          path: spec.provider
          value: azure
      - equal:
          path: spec.parameters.clientID
          value: my-client-id
      - equal:
          path: spec.parameters.keyvaultName
          value: my-vault
      - equal:
          path: spec.parameters.tenantId
          value: my-tenant
      - equal:
          path: spec.secretObjects[0].type
          value: Opaque
      - isNotEmpty:
          path: spec.secretObjects[0].secretName

  - it: should not render when secretsStoreCsiDriver.create is false
    set:
      secretsStoreCsiDriver:
        create: false
    asserts:
      - hasDocuments:
          count: 0
