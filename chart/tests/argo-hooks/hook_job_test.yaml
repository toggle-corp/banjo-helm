suite: Argo Hook Job tests
templates:
  - templates/argo-hooks/hook-job.yaml
  - templates/config/secret.yaml
  - templates/config/configmap.yaml
tests:
  - it: should render one Job per enabled hook (filtering disabled ones)
    template: templates/argo-hooks/hook-job.yaml
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      argoHook:
        enabled: true
        hooks:
          db-migrate:
            enabled: true
          collect-static:
            enabled: true
          disabled-hook:
            enabled: false
            hook: PostSync
            command: ["./never"]
    asserts:
      - hasDocuments:
          count: 2

  - it: should use generateName when preserveHistory is true
    template: templates/argo-hooks/hook-job.yaml
    documentSelector:
      path: metadata.annotations["argocd.argoproj.io/hook"]
      value: PostSync
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      argoHook:
        enabled: true
        hooks:
          db-migrate:
            enabled: true
            preserveHistory: true
          collect-static:
            enabled: false
    asserts:
      - isKind:
          of: Job
      - isAPIVersion:
          of: batch/v1
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: PostSync
      - isNotEmpty:
          path: metadata.generateName
      - notExists:
          path: metadata.name
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["./manage.py", "migrate"]
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/app:v1"
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never

  - it: should use static name when preserveHistory is falsy
    template: templates/argo-hooks/hook-job.yaml
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      argoHook:
        enabled: true
        hooks:
          db-migrate:
            enabled: false
          collect-static:
            enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isNotEmpty:
          path: metadata.name
      - notExists:
          path: metadata.generateName

  - it: should set args when hook.args provided
    template: templates/argo-hooks/hook-job.yaml
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      argoHook:
        enabled: true
        hooks:
          db-migrate:
            enabled: false
          collect-static:
            enabled: false
          custom:
            enabled: true
            hook: PostSync
            command: ["/bin/bash", "-c"]
            args: ["date --iso-8601 && ls"]
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["date --iso-8601 && ls"]

  - it: should not render when argoHook.enabled is false
    template: templates/argo-hooks/hook-job.yaml
    set:
      argoHook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when no hooks are enabled
    template: templates/argo-hooks/hook-job.yaml
    set:
      image:
        name: ghcr.io/example/app
        tag: v1
      argoHook:
        enabled: true
        hooks:
          db-migrate:
            enabled: false
          collect-static:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0
